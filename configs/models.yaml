# Model registry for the safety classifier.
# Paths are relative to the repository root.

fasttext:
  attack_head_path: models/fasttext/attack_head.ftz
  abuse_head_path: models/fasttext/abuse_head.ftz
  high_risk_head_path: models/fasttext/high_risk_head.ftz

transformers:
  prompt_injection:
    hf_name: protectai/deberta-v3-base-prompt-injection-v2
    finetuned_path: models/finetuned/prompt_injection
    local_path: models/transformers/prompt_injection
    onnx_path: models/onnx/prompt_injection
    int8_path: models/onnx_int8/prompt_injection

  jailbreak:
    hf_name: madhurjindal/Jailbreak-Detector
    finetuned_path: models/finetuned/jailbreak
    local_path: models/transformers/jailbreak
    onnx_path: models/onnx/jailbreak
    int8_path: models/onnx_int8/jailbreak

  moderation_primary:
    hf_name: KoalaAI/Text-Moderation
    finetuned_path: models/finetuned/moderation
    local_path: models/transformers/koalaai_moderation
    onnx_path: models/onnx/koalaai_moderation
    int8_path: models/onnx_int8/koalaai_moderation

  moderation_fallback:
    hf_name: oxyapi/albert-moderation-001
    finetuned_path: models/finetuned/moderation_bert
    local_path: models/transformers/oxyapi_moderation
    onnx_path: models/onnx/oxyapi_moderation
    int8_path: models/onnx_int8/moderation_bert

  # toxic_fallback disabled: Intel/toxic-prompt-roberta PR-AUC=0.43 (below random)
  # on our multi-label taxonomy. Binary TOXIC/NOT_TOXIC doesn't map to our labels.
